name: CI - Run Pytest and Allure

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest   # можно также windows-latest, macos-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']  # проверяем на нескольких версиях

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov allure-pytest
        # если у вас есть requirements.txt:
        # pip install -r requirements.txt

    - name: Run tests with coverage
      run: |
        pytest --cov=library --cov-report=term-missing --alluredir=allure-results

    - name: Upload coverage report to GitHub
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}  # опционально, но рекомендуем

    - name: Upload Allure results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.python-version }}
        path: allure-results
        retention-days: 7

    - name: Generate Allure Report (optional)
      if: always()
      run: |
        # установка allure-commandline (если нужен отчёт в CI)
        # можно сделать отдельный job, но для начала просто сохраним сырые результаты
        echo "Allure results saved. Download artifact to view report locally."
